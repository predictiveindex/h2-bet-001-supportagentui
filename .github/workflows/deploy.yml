name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  ACR_NAME: h2experimentsacr
  IMAGE_NAME: supportagentui
  CONTAINER_APP_NAME: app-supportagentui
  RESOURCE_GROUP: rg-h2-experiments-dev
  BICEP_FILE: infra/main.bicep

jobs:
  deploy:
    name: Build, Deploy Infra & Update Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep Infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_FILE }} \
            --parameters imageTag=${{ github.sha }} \
            --no-wait false

      - name: Build & Push Container Image
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile \
            .

      - name: Update Container App (new revision)
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --revision-suffix "${GITHUB_SHA::8}"

      - name: Print Container App URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "✅ Deployed to: https://$URL"
